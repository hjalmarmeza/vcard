<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Visual: Aptitudes y Certificaciones</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Animations */
        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .7;
                transform: scale(1.05);
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-[#050b14] text-slate-300 font-sans min-h-screen selection:bg-amber-500/30 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        // --- DATA ---
        const aptitudes = [
            { id: 'ops', title: "Liderazgo & Operaciones", icon: "fas fa-users-cog", skills: ["Liderazgo Transformador", "Dirección de Equipos", "Rentabilidad", "Optimización de KPIs", "Resolución de Problemas", "Gestión de Proyectos", "Mitigación de Riesgos"] },
            { id: 'tech', title: "IA & Transformación Tech", icon: "fas fa-microchip", skills: ["Transformación Digital", "IA Generativa", "Ingeniería de Prompts", "Ecosistemas Cloud", "Machine Learning", "Análisis Técnico"] },
            { id: 'cx', title: "Ventas & Factor Humano", icon: "fas fa-handshake", skills: ["Estrategia Comercial", "Experiencia del Cliente (CX)", "Inteligencia Emocional", "Comunicación Interpersonal", "Negociación", "Innovación"] }
        ];

        const certCategories = [
            { category: "IA & Estrategia Digital", iconClass: "fas fa-brain", year: "2023-2024", items: ["Habilidades Humanas en la Era de IA", "Productividad con Agentes de IA", "Estrategia de IA Generativa", "Ingeniería de Prompts", "Fundamentos de IA en Azure"] },
            { category: "Transformación & CX", iconClass: "fas fa-chart-bar", year: "2022-2023", items: ["Estrategia de Experiencia del Cliente", "Transformación Digital", "NPS y Lealtad del Cliente", "Pensamiento Estratégico", "Diseño de Servicios"] },
            { category: "Liderazgo & Gestión", iconClass: "fas fa-shield-alt", year: "2020-2022", items: ["Liderazgo Transformador", "Coaching Directivo", "Experto en RGPD (UE)", "Gestión Ágil", "Gestión de Proyectos"] }
        ];


        // --- VISTA 1: HUD CIBERNÉTICO (Radares y Líneas de Tiempo) ---
        const VistaCybernetics = () => (
            <div className="space-y-16 animate-fade-in">
                {/* APTITUDES - MATRIZ DE RADARES */}
                <section>
                    <div className="text-center mb-10">
                        <h2 className="text-amber-500 text-xs font-black uppercase tracking-[0.3em] mb-2">Opción 1: HUD Cibernético</h2>
                        <h1 className="text-3xl font-black text-white uppercase tracking-tight">Matriz de Competencias</h1>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {aptitudes.map((grupo, idx) => (
                            <div key={idx} className="relative p-6 bg-slate-900/40 rounded-3xl border border-slate-800 overflow-hidden group hover:border-amber-500/50 transition-all duration-500 hover:shadow-[0_0_30px_rgba(245,158,11,0.1)]">
                                {/* Círculos de fondo (Radar) */}
                                <div className="absolute top-[-50px] right-[-50px] w-40 h-40 border border-amber-500/10 rounded-full animate-pulse-slow"></div>
                                <div className="absolute top-[-20px] right-[-20px] w-32 h-32 border border-amber-500/20 rounded-full"></div>

                                <div className="flex items-center gap-4 mb-6 relative z-10">
                                    <div className="w-12 h-12 rounded-full bg-amber-500/10 flex items-center justify-center text-amber-500 text-xl border border-amber-500/30 group-hover:scale-110 group-hover:bg-amber-500/20 transition-all">
                                        <i className={grupo.icon}></i>
                                    </div>
                                    <h3 className="text-lg font-black text-white uppercase tracking-tight leading-tight">{grupo.title}</h3>
                                </div>

                                <ul className="space-y-3 relative z-10">
                                    {grupo.skills.map((skill, i) => (
                                        <li key={i} className="flex items-center gap-3 text-sm text-slate-400 group-hover:text-slate-300 transition-colors">
                                            <div className="w-1.5 h-1.5 bg-amber-500 rounded-full shadow-[0_0_5px_rgba(245,158,11,0.8)]"></div>
                                            <span className="font-medium tracking-wide uppercase text-[10px]">{skill}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>
                </section>

                {/* CERTIFICACIONES - LÍNEA DE TIEMPO NEÓN */}
                <section>
                    <div className="text-center mb-16">
                        <h1 className="text-3xl font-black text-white uppercase tracking-tight">Evolución de Certificaciones</h1>
                    </div>

                    <div className="max-w-4xl mx-auto relative">
                        {/* Línea central */}
                        <div className="absolute left-[28px] md:left-1/2 top-0 bottom-0 w-[2px] bg-gradient-to-b from-amber-500/50 via-amber-500/20 to-transparent"></div>

                        {certCategories.map((cat, idx) => (
                            <div key={idx} className={`relative flex flex-col md:flex-row gap-8 mb-12 ${idx % 2 === 0 ? 'md:flex-row-reverse' : ''}`}>
                                {/* Nodo Central */}
                                <div className="absolute left-0 md:left-1/2 md:-translate-x-1/2 w-14 h-14 rounded-full bg-slate-950 border-2 border-amber-500 flex items-center justify-center text-amber-500 z-10 shadow-[0_0_15px_rgba(245,158,11,0.3)]">
                                    <i className={`${cat.iconClass} text-xl`}></i>
                                </div>

                                {/* Contenido */}
                                <div className={`ml-20 md:ml-0 md:w-1/2 ${idx % 2 === 0 ? 'md:pl-16' : 'md:pr-16 md:text-right'}`}>
                                    <div className="bg-slate-900/60 p-6 rounded-2xl border border-slate-800 hover:border-amber-500/30 transition-all">
                                        <h3 className="text-amber-500 font-black uppercase text-sm tracking-widest mb-1">{cat.category}</h3>
                                        <p className="text-slate-500 text-xs font-mono mb-4">{cat.year}</p>
                                        <div className={`flex flex-wrap gap-2 ${idx % 2 === 0 ? 'justify-start' : 'justify-start md:justify-end'}`}>
                                            {cat.items.map((item, i) => (
                                                <span key={i} className="px-2.5 py-1 bg-slate-950 border border-slate-800 text-[9px] font-bold text-slate-300 uppercase rounded hover:border-amber-500/50 transition-colors">
                                                    {item}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        );


        // --- VISTA 2: PANELES HOLOGRÁFICOS (Glassmorphism Interactivo) ---
        const VistaHolographic = () => {
            const [activeTab, setActiveTab] = React.useState(0);

            return (
                <div className="space-y-16 animate-fade-in">
                    {/* APTITUDES - NUBES FLOTANTES */}
                    <section>
                        <div className="text-center mb-10">
                            <h2 className="text-amber-500 text-xs font-black uppercase tracking-[0.3em] mb-2">Opción 2: Paneles Holográficos</h2>
                            <h1 className="text-3xl font-black text-white uppercase tracking-tight">Aptitudes & Competencias</h1>
                        </div>

                        <div className="flex flex-col gap-6">
                            {aptitudes.map((grupo, idx) => (
                                <div key={idx} className="relative flex flex-col md:flex-row items-stretch bg-gradient-to-r from-slate-900/80 to-transparent border-l-4 border-amber-500 rounded-r-2xl overflow-hidden group">
                                    {/* Icono lateral */}
                                    <div className="flex items-center justify-center p-6 md:p-8 bg-slate-900/50 md:w-48 border-b md:border-b-0 md:border-r border-slate-800">
                                        <div className="text-center">
                                            <i className={`${grupo.icon} text-3xl text-amber-500 opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all duration-300`}></i>
                                            <h3 className="mt-3 text-[10px] font-black tracking-widest uppercase text-white">{grupo.title}</h3>
                                        </div>
                                    </div>

                                    {/* Skills Tags */}
                                    <div className="p-6 md:p-8 flex-1 flex flex-wrap gap-3 items-center">
                                        {grupo.skills.map((skill, i) => (
                                            <span key={i} className={`px-4 py-2 text-[10px] font-bold uppercase tracking-wide rounded-lg backdrop-blur-md transition-all duration-300
                                                ${i % 2 === 0 ? 'bg-amber-500/10 text-amber-500 border border-amber-500/30 hover:bg-amber-500/20 hover:-translate-y-1' : 'bg-slate-800/50 text-slate-300 border border-slate-700 hover:border-slate-500 hover:-translate-y-1'}`}>
                                                {skill}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* CERTIFICACIONES - ACCORDION ITERACTIVO INTERFAZ HUD */}
                    <section className="mt-20">
                        <div className="text-center mb-10">
                            <h1 className="text-3xl font-black text-white uppercase tracking-tight">Bóveda de Certificaciones</h1>
                        </div>

                        <div className="flex flex-col md:flex-row gap-6 bg-slate-900/30 p-4 md:p-6 rounded-3xl border border-slate-800/80">
                            {/* Menú de Categorías (Izquierda) */}
                            <div className="md:w-1/3 flex flex-col gap-2">
                                {certCategories.map((cat, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setActiveTab(idx)}
                                        className={`flex items-center gap-3 p-4 rounded-xl text-left transition-all duration-300 ${activeTab === idx ? 'bg-amber-500/10 border border-amber-500/30 shadow-[inset_4px_0_0_0_rgba(245,158,11,1)]' : 'bg-transparent border border-transparent hover:bg-slate-800/50'}`}
                                    >
                                        <i className={`${cat.iconClass} ${activeTab === idx ? 'text-amber-500' : 'text-slate-500'}`}></i>
                                        <span className={`text-xs uppercase tracking-widest font-black ${activeTab === idx ? 'text-white' : 'text-slate-400'}`}>
                                            {cat.category}
                                        </span>
                                        <i className={`fas fa-chevron-right ml-auto text-[10px] ${activeTab === idx ? 'text-amber-500 opacity-100' : 'opacity-0'}`}></i>
                                    </button>
                                ))}
                            </div>

                            {/* Contenido de la Categoría Activa (Derecha) */}
                            <div className="md:w-2/3 bg-slate-950 rounded-2xl p-6 md:p-10 border border-slate-800 relative overflow-hidden min-h-[300px] flex flex-col justify-center">
                                {/* Decoración de fondo */}
                                <div className="absolute -bottom-10 -right-10 opacity-5 pointer-events-none">
                                    <i className={`${certCategories[activeTab].iconClass} text-[200px]`}></i>
                                </div>

                                <div className="relative z-10 animate-fade-in" key={activeTab}>
                                    <h3 className="text-xl font-black text-amber-500 uppercase tracking-tight mb-6 flex items-center gap-3">
                                        <i className="fas fa-certificate"></i> {certCategories[activeTab].category}
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {certCategories[activeTab].items.map((item, i) => (
                                            <div key={i} className="flex items-start gap-3 p-3 bg-slate-900/50 rounded-lg border border-slate-800/80 hover:border-amber-500/40 transition-colors">
                                                <i className="fas fa-check-circle text-amber-500/70 text-sm mt-0.5"></i>
                                                <span className="text-xs text-slate-300 uppercase font-bold tracking-tight leading-snug">{item}</span>
                                            </div>
                                        ))}
                                        <div className="flex items-start gap-3 p-3 bg-amber-500/5 rounded-lg border border-amber-500/20 justify-center items-center">
                                            <span className="text-[10px] text-amber-500 uppercase font-black tracking-widest italic">+10 Adicionales...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };


        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = React.useState('cyber'); // 'cyber' o 'holo'

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10">

                    {/* ENCABEZADO Y CONTROLES */}
                    <div className="bg-slate-900/80 backdrop-blur-md p-6 rounded-2xl border border-slate-800 mb-12 flex flex-col md:flex-row items-center justify-between gap-6 sticky top-4 z-50">
                        <div>
                            <h1 className="text-xl md:text-2xl font-black text-white uppercase tracking-tight">Simulador de Diseños</h1>
                            <p className="text-slate-400 text-xs mt-1 uppercase tracking-widest font-mono">Panel de Control Creativo</p>
                        </div>

                        <div className="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                            <button
                                onClick={() => setView('cyber')}
                                className={`px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${view === 'cyber' ? 'bg-amber-500 text-slate-900 shadow-[0_0_15px_rgba(245,158,11,0.4)]' : 'text-slate-500 hover:text-white'}`}
                            >
                                <i className="fas fa-crosshairs mr-2"></i> Opción 1: HUD Cyber
                            </button>
                            <button
                                onClick={() => setView('holo')}
                                className={`px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${view === 'holo' ? 'bg-amber-500 text-slate-900 shadow-[0_0_15px_rgba(245,158,11,0.4)]' : 'text-slate-500 hover:text-white'}`}
                            >
                                <i className="fas fa-layer-group mr-2"></i> Opción 2: Paneles
                            </button>
                        </div>
                    </div>

                    {/* RENDERIZADO DE LA VISTA SELECCIONADA */}
                    <div className="transition-all duration-500 delay-150">
                        {view === 'cyber' ? <VistaCybernetics /> : <VistaHolographic />}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

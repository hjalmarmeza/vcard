<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hjalmar Meza | Contacto Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0b;
            --primary: #f5a623;
            --secondary: #50e3c2;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --card-border: rgba(255, 255, 255, 0.08);
            --btn-bg: rgba(255, 255, 255, 0.04);
        }

        * { margin:0; padding:0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            margin: 0;
        }

        .phone-card {
            width: 100%;
            max-width: 380px;
            background: linear-gradient(180deg, rgba(245, 166, 35, 0.03) 0%, rgba(10, 10, 11, 1) 100%);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 3rem 1.5rem;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin: 0 auto 2rem;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(245,166,35,0.2);
            background-color: #222;
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: 0.5px; }
        
        .headline { 
            font-size: 0.95rem; 
            color: var(--text-dim); 
            margin-bottom: 3rem; 
            line-height: 1.5;
            padding: 0 10px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 1.1rem;
            border-radius: 20px;
            background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }

        .btn.primary {
            background: var(--primary);
            color: #000;
            border: none;
            box-shadow: 0 10px 25px rgba(245,166,35,0.3);
        }

        .btn i { font-size: 1.2rem; }

        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .footer-logo {
            margin-top: 3.5rem;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #333;
            text-transform: uppercase;
        }

        .glow {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="phone-card">
        <div class="glow"></div>
        
        <!-- Tu foto de perfil -->
        <img src="foto linkedin Hjal.jpeg" alt="Hjalmar Meza" class="avatar">

        <h1>Hjalmar Meza Cortez</h1>
        <p class="headline">Líder de Operaciones & Transformación Digital | IA Aplicada & Estrategia Telco</p>

        <div class="actions">
            <!-- Botón para descargar el contacto -->
            <a href="#" class="btn primary" onclick="downloadVCard()">
                <i class="fas fa-user-plus"></i> Guardar contacto
            </a>

            <!-- Botón para ver el CV Web -->
            <a href="index.html" class="btn">
                <i class="fas fa-globe"></i> Ver mi CV Web
            </a>

            <!-- Botón para LinkedIn -->
            <a href="https://www.linkedin.com/in/hjalmar-meza-cortez-17215160/" target="_blank" class="btn">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
        </div>

        <div class="footer-logo">Hjalmar Meza &bull; 2026</div>
    </div>

    <script>
        function downloadVCard() {
            const vcardData = `BEGIN:VCARD
VERSION:3.0
FN:Hjalmar Meza Cortez
TITLE:Líder de Operaciones & Transformación Digital
ORG:Hjalmar Meza Consulting
URL:https://www.linkedin.com/in/hjalmar-meza-cortez-17215160/
NOTE:Especialista en IA aplicada y Gestión de Proyectos Telco.
END:VCARD`;

            const blob = new Blob([vcardData], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const newLink = document.createElement('a');
            newLink.download = 'Hjalmar_Meza.vcf';
            newLink.href = url;
            newLink.click();
            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>

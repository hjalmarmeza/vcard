<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | Hjalmar Meza</title>
    <style>
        :root {
            --obsidian: #0a0a0c;
            --gold: #d4af37;
            --gold-bright: #f5d17a;
            --slate: #1e293b;
        }
        
        body {
            background-color: var(--obsidian);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        .card-perspective {
            perspective: 1000px;
            width: 90%;
            max-width: 400px;
        }

        .main-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: rotateX(5deg);
            transition: transform 0.6s ease;
            position: relative;
        }

        .main-card:hover {
            transform: rotateX(0deg) scale(1.02);
            border-color: var(--gold);
        }

        /* Decorative Circuit Lines */
        .main-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--gold) 1px, transparent 1px),
                linear-gradient(90deg, var(--gold) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.03;
            pointer-events: none;
        }

        .qr-wrapper {
            position: relative;
            display: inline-block;
            padding: 15px;
            background: linear-gradient(145deg, #111, #222);
            border-radius: 18px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8), 0 5px 15px rgba(212, 175, 55, 0.1);
            margin-bottom: 2rem;
        }

        .qr-image {
            display: block;
            width: 280px;
            height: auto;
            border-radius: 8px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2));
        }

        .header-content h1 {
            font-size: 1.2rem;
            color: var(--gold-bright);
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 700;
        }

        .header-content p {
            color: #8892b0;
            font-size: 0.85rem;
            margin-top: 0.7rem;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--gold);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .accent-corners div {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.6;
        }

        .top-left { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
        .bottom-right { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    </style>
</head>
<body>

    <div class="card-perspective">
        <div class="main-card">
            <div class="accent-corners">
                <div class="top-left"></div>
                <div class="bottom-right"></div>
            </div>

            <div class="status-badge">
                <span class="status-dot"></span>
                SISTEMA ACTIVO
            </div>

            <div class="qr-wrapper">
                <img src="codigo_qr_hjalmar_final_PRO_V2.png" alt="Hjalmar Meza QR" class="qr-image">
            </div>

            <div class="header-content">
                <h1>IDENTIDAD DIGITAL</h1>
                <p>Escanéame para acceder a mi red profesional y descargar mi contacto ejecutivo.</p>
            </div>
        </div>
    </div>

</body>
</html>
